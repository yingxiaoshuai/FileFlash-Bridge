schema: spec-driven
context: |
  项目名称：FileFlash-Bridge
  产品定位：基于 React Native 的跨平台移动应用，使用一套代码同时交付 iOS 与 Android。
  核心场景：将手机作为同一局域网内的轻量级双向文件中转站，其他设备无需安装 App，仅通过浏览器扫码或访问地址即可与手机进行文件上传和下载。
  技术栈：React Native + TypeScript。
  开发原则：
  - 默认优先复用 React Native 共享代码，保证 iOS 与 Android 功能一致。
  - 仅在系统能力、权限模型或平台交互差异明确存在时，才允许编写平台专属实现。
  - 涉及文件系统、局域网通信、扫码、原生权限等能力时，优先选择成熟稳定的 React Native 社区库；确有必要时再补充原生模块。
  - 所有设计都必须同时考虑 iOS 与 Android 的权限、文件访问方式、网络行为和前后台限制差异。
  质量要求：
  - 优先保证局域网传输稳定性、权限流程清晰度、用户隐私与文件安全。
  - 所有 OpenSpec 产出默认使用简体中文。
  - 新功能必须说明共享代码范围、iOS 差异、Android 差异和验证方式。

rules:
  proposal:
    - 必须明确该需求在 iOS 与 Android 上的用户价值、使用场景和交付范围。
    - 必须说明方案是否完全基于 React Native 实现，是否需要引入第三方原生库或自定义 Native Module。
    - 涉及文件访问、局域网传输、扫码、后台运行或权限申请时，必须说明安全、隐私和兼容性影响。
    - 如果能力只支持单平台，必须解释原因和后续补齐计划。
  design:
    - 优先描述 React Native 共享层设计，再单独列出 iOS 和 Android 的差异化实现。
    - 必须覆盖文件选择、文件保存、上传下载流程、异常处理、重试策略和用户提示。
    - 必须说明 iOS 与 Android 的权限申请路径、系统限制和交互差异。
    - 如涉及原生桥接，必须定义 JS 层接口、原生边界、降级方案和测试方案。
  tasks:
    - 任务拆分必须同时覆盖共享代码实现、iOS 验证和 Android 验证。
    - 每个任务都应具备明确可验证结果，粒度尽量控制在半天到一天内。
    - 至少包含真机验证、局域网文件传输验证和权限流程验证任务。
    - 涉及 UI 或交互变更时，必须包含双端验收说明。
