buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

apply plugin: "com.facebook.react.rootproject"

def isWindowsHost = System.getProperty("os.name").toLowerCase().contains("windows")

subprojects { subproject ->
    if (isWindowsHost && subproject.path != ":app") {
        subproject.tasks.matching { task ->
            task.name.startsWith("verify") && task.name.endsWith("Resources")
        }.configureEach {
            // On Windows, AGP resource verification can falsely reject valid
            // transitive PNG assets inside library modules during release builds.
            enabled = false
        }
    }
}
